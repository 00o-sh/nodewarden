name: Sync upstream

# Opens (or updates) a pull request that merges upstream
# (shuaiplus/NodeWarden) into `main` for review. This workflow NEVER pushes to
# `main` and NEVER force-pushes `main` — its only write is to the dedicated
# `automation/upstream-sync` branch that backs a single auto-updated PR.
# Cloudflare only deploys `main`, so no upstream code goes live until a human
# reviews the PR (diff + CI) and merges it.
#
# Behaviour:
#   - Runs nightly (03:00 UTC) and on demand (workflow_dispatch).
#   - Resolves a target: the latest upstream *release* on the schedule, or the
#     dispatch input (commit/tag), or the latest upstream/main commit when the
#     input is blank.
#   - A clean merge pushes the sync branch and opens/updates the PR.
#   - A merge with conflicts fails the run loudly (no partial state is pushed) so
#     it can be resolved by hand.
#
# Token note: opening a PR from a workflow needs either a PAT or the repo setting
# "Allow GitHub Actions to create and approve pull requests" (and even then it's
# unreliable on forks). So the run NEVER hard-fails on PR creation: it always
# pushes the sync branch, opens/updates the PR when it can, and otherwise stays
# green with a one-click compare link in the run summary. Set a repo secret
# `SYNC_UPSTREAM_PAT` (fine-grained PAT, contents:write + pull-requests:write) for
# fully-automatic PRs that also trigger CI on the sync PR.

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      target_commit:
        description: 'Commit hash or tag (blank = latest upstream/main commit)'
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: sync-upstream
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      SYNC_BRANCH: automation/upstream-sync
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          # Prefer a PAT so the resulting PR triggers CI; fall back to the
          # default token (PR still opens, CI may need a manual nudge).
          token: ${{ secrets.SYNC_UPSTREAM_PAT || secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream
        run: |
          git remote add upstream https://github.com/shuaiplus/NodeWarden.git || true
          git fetch upstream --tags

      - name: Resolve target commit
        id: resolve
        env:
          # Pass the user-supplied input via env, never inline ${{ }} in the
          # script, so its contents can't be interpreted as shell code.
          MANUAL_INPUT: ${{ github.event.inputs.target_commit }}
        run: |
          if [ -n "$MANUAL_INPUT" ]; then
            TARGET_SHA=$(git rev-parse "${MANUAL_INPUT}^{commit}" 2>/dev/null) \
              || { echo "::error::Cannot resolve '$MANUAL_INPUT' to a commit."; exit 1; }
            LABEL="$MANUAL_INPUT"
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            LATEST_TAG=$(curl -fsSL https://api.github.com/repos/shuaiplus/NodeWarden/releases/latest | jq -r .tag_name)
            if [ -z "$LATEST_TAG" ] || [ "$LATEST_TAG" = "null" ]; then
              echo "::error::No upstream release found."; exit 1
            fi
            TARGET_SHA=$(git rev-list -n 1 "$LATEST_TAG" 2>/dev/null) \
              || { echo "::error::Tag '$LATEST_TAG' not found after fetch."; exit 1; }
            LABEL="$LATEST_TAG"
          else
            TARGET_SHA=$(git rev-parse upstream/main)
            LABEL="upstream/main@${TARGET_SHA:0:12}"
          fi
          echo "target_sha=$TARGET_SHA" >> "$GITHUB_OUTPUT"
          echo "label=$LABEL" >> "$GITHUB_OUTPUT"
          echo "Target: $LABEL ($TARGET_SHA)"

      - name: Check if update is needed
        id: check
        run: |
          TARGET_SHA="${{ steps.resolve.outputs.target_sha }}"
          if git merge-base --is-ancestor "$TARGET_SHA" origin/main 2>/dev/null; then
            echo "main already contains $TARGET_SHA — nothing to sync."
            echo "needs_update=false" >> "$GITHUB_OUTPUT"
          else
            echo "needs_update=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Merge upstream into the sync branch
        id: merge
        if: steps.check.outputs.needs_update == 'true'
        run: |
          TARGET_SHA="${{ steps.resolve.outputs.target_sha }}"
          git checkout -B "$SYNC_BRANCH" origin/main
          if git merge --no-edit "$TARGET_SHA"; then
            # Never let an upstream merge rewrite this workflow file.
            git checkout origin/main -- .github/workflows/sync-upstream.yml
            if ! git diff --cached --quiet; then
              git commit -m "chore: keep our sync-upstream workflow"
            fi
            echo "conflicts=false" >> "$GITHUB_OUTPUT"
          else
            git merge --abort
            echo "conflicts=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push sync branch
        if: steps.check.outputs.needs_update == 'true' && steps.merge.outputs.conflicts == 'false'
        run: git push --force origin "$SYNC_BRANCH"

      - name: Open or update the sync PR
        if: steps.check.outputs.needs_update == 'true' && steps.merge.outputs.conflicts == 'false'
        env:
          GH_TOKEN: ${{ secrets.SYNC_UPSTREAM_PAT || secrets.GITHUB_TOKEN }}
          USING_PAT: ${{ secrets.SYNC_UPSTREAM_PAT != '' }}
          LABEL: ${{ steps.resolve.outputs.label }}
          TARGET_SHA: ${{ steps.resolve.outputs.target_sha }}
          COMPARE_URL: ${{ github.server_url }}/${{ github.repository }}/compare/main...automation/upstream-sync?expand=1
        run: |
          # The sync branch is already pushed, so the useful work is done. PR
          # creation can still be blocked when running on the default GITHUB_TOKEN
          # (GitHub restricts token-created PRs unless "Allow GitHub Actions to
          # create and approve pull requests" is on, and it's unreliable on forks).
          # So we try to open/update the PR, but on failure we stay green and hand
          # back a one-click compare link instead of erroring out.
          BODY=$(printf '%s\n' \
            "Automated merge of upstream \`shuaiplus/NodeWarden\` (\`$LABEL\`, \`$TARGET_SHA\`) into \`main\`." \
            "" \
            "Review the diff and wait for CI before merging — nothing deploys until this PR is merged." \
            "The branch is force-updated by each nightly run, so this PR always reflects the latest upstream target.")

          EXISTING=$(gh pr list --head "$SYNC_BRANCH" --base main --state open --json number --jq '.[0].number // empty' 2>/dev/null || true)
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING is already open for $SYNC_BRANCH; the branch push updated it."
            gh pr edit "$EXISTING" --title "chore: sync upstream ($LABEL)" --body "$BODY" \
              || echo "::warning::Could not update PR #$EXISTING metadata (non-fatal)."
            echo "### Sync PR #$EXISTING updated" >> "$GITHUB_STEP_SUMMARY"
            echo "- **Target:** $LABEL" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          if gh pr create --base main --head "$SYNC_BRANCH" --title "chore: sync upstream ($LABEL)" --body "$BODY"; then
            echo "Opened the sync PR."
            echo "### Sync PR opened" >> "$GITHUB_STEP_SUMMARY"
            echo "- **Target:** $LABEL" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          # Could not create the PR with the available token — do not fail; the
          # branch is ready and a human can open the PR with one click.
          echo "::warning::Could not open the PR automatically (the token can't create PRs here). The sync branch is pushed and ready."
          {
            echo "### Upstream synced — open the PR manually"
            echo ""
            echo "The \`$SYNC_BRANCH\` branch is updated to **$LABEL** and ready."
            echo ""
            echo "👉 [**Open the upstream-sync PR**]($COMPARE_URL)"
            echo ""
            if [ "$USING_PAT" != "true" ]; then
              echo "For fully-automatic PR opening (and CI on the sync PR), add a repo secret"
              echo "\`SYNC_UPSTREAM_PAT\` (a fine-grained PAT with contents:write + pull-requests:write),"
              echo "or verify **Settings → Actions → General → Workflow permissions →"
              echo "\"Allow GitHub Actions to create and approve pull requests\"** is enabled."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail on merge conflicts
        if: steps.check.outputs.needs_update == 'true' && steps.merge.outputs.conflicts == 'true'
        run: |
          echo "::error::Upstream merge into '$SYNC_BRANCH' has conflicts (target ${{ steps.resolve.outputs.label }}). Resolve locally and open the PR by hand; nothing was pushed."
          exit 1

      - name: Summary
        if: always()
        run: |
          if [ "${{ steps.check.outputs.needs_update }}" != "true" ]; then
            echo "### Nothing to sync" >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ steps.merge.outputs.conflicts }}" = "true" ]; then
            echo "### Upstream merge has conflicts — manual resolution needed" >> "$GITHUB_STEP_SUMMARY"
            echo "- **Target:** ${{ steps.resolve.outputs.label }}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### Sync PR opened/updated" >> "$GITHUB_STEP_SUMMARY"
            echo "- **Target:** ${{ steps.resolve.outputs.label }}" >> "$GITHUB_STEP_SUMMARY"
            echo "- **Branch:** \`${{ env.SYNC_BRANCH }}\`" >> "$GITHUB_STEP_SUMMARY"
          fi
