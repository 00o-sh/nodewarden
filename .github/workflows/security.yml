name: Security Scan

on:
  push:
    branches:
      - main
  pull_request:
    branches: 
      - main
  workflow_dispatch:

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Initialize CodeQL
        if: env.ACT != 'true'
        continue-on-error: true
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          languages: javascript-typescript, actions
          build-mode: none
          queries: security-extended,security-and-quality

      - name: Perform CodeQL Analysis
        if: env.ACT != 'true'
        continue-on-error: true
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          upload: true
          output: sarif-results

      - name: Install Gitleaks
        if: env.ACT != 'true'
        run: |
          GITLEAKS_VERSION="8.28.0"
          ASSET="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          BASE="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"
          curl -fsSL -o "$ASSET" "${BASE}/${ASSET}"
          curl -fsSL -o gitleaks_checksums.txt "${BASE}/gitleaks_${GITLEAKS_VERSION}_checksums.txt"
          # Verify the downloaded tarball against the release's published checksums.
          sha256sum --ignore-missing -c gitleaks_checksums.txt
          tar -xzf "$ASSET" gitleaks
          chmod +x gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks

      - name: Secret Detection
        if: env.ACT != 'true'
        continue-on-error: true
        run: |
          gitleaks git . --report-format sarif --report-path results.sarif --no-banner || true

      - name: Dependency Scan (Trivy)
        if: env.ACT != 'true'
        # Official action installs Trivy and manages the vuln-DB cache, so no
        # brew/PATH handling. exit-code 0 keeps findings non-blocking, while a
        # genuine tool/run failure still fails the step ("couldn't scan" stays
        # visible). TRIVY_INCLUDE_DEV_DEPS: this project's dependency vulns live
        # in the build toolchain (dev deps), which Trivy excludes by default.
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          severity: CRITICAL,HIGH,MEDIUM
          format: sarif
          output: trivy_deps.sarif
          exit-code: '0'
        env:
          TRIVY_INCLUDE_DEV_DEPS: 'true'

      - name: Check for Dockerfile
        id: check_docker
        run: |
          if [ -f "Dockerfile" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Container Config Scan (Trivy)
        if: steps.check_docker.outputs.exists == 'true'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: config
          scan-ref: .
          severity: CRITICAL,HIGH
          format: json
          output: trivy_result.json
          exit-code: '0'

      - name: Generate Security Report
        run: |
          # Gitleaks typically produces results.sarif if configured or by default in some versions
          # We'll ensure it exists for our reporter
          node .github/scripts/security.cjs
          
          # Also append to step summary for immediate visibility in GHA UI
          cat security-report.md >> $GITHUB_STEP_SUMMARY
          echo -e "\n---\n" >> $GITHUB_STEP_SUMMARY
          cat security-report-cn.md >> $GITHUB_STEP_SUMMARY

      - name: Upload Gitleaks Results to GitHub Security
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        if: always()
        with:
          sarif_file: results.sarif
          category: gitleaks

      - name: Upload Trivy Dependency Results to GitHub Security
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        if: always() && hashFiles('trivy_deps.sarif') != ''
        with:
          sarif_file: trivy_deps.sarif
          category: trivy-deps

      - name: Upload Security Report Artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: security-report
          if-no-files-found: ignore
          path: |
            security-report.md
            security-report-cn.md
            trivy_deps.sarif
            trivy_result.json
            results.sarif
            sarif-results/*.sarif

  supply-chain:
    # Verifies the integrity of the dependency tree against the registry and
    # produces an SBOM. Kept separate from `scan` so a supply-chain finding is
    # attributable on its own, and runs read-only.
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies (locked)
        run: npm ci

      - name: Verify registry signatures / provenance
        # Confirms every installed package matches the registry's published
        # signature. Non-blocking (matches the project's "visible, not gating"
        # scan policy) because not all transitive packages publish signatures
        # yet — a genuine mismatch still shows up in the step summary.
        continue-on-error: true
        run: |
          echo '## npm audit signatures' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          npm audit signatures 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Known-vulnerability audit
        continue-on-error: true
        run: |
          echo '## npm audit (high+)' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          npm audit --audit-level=high 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Generate SBOM (CycloneDX)
        run: npm sbom --sbom-format cyclonedx --omit dev > sbom.cyclonedx.json

      - name: Upload SBOM
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sbom
          if-no-files-found: warn
          path: sbom.cyclonedx.json
