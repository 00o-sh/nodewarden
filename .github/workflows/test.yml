name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

# Minimal default token: read-only at the top level. The test job escalates
# to contents: write only where it needs to (badge publishing on main).
permissions:
  contents: read

# Cancel superseded runs on the same ref so a rapid push sequence does not
# pile up redundant jobs (and racing badge pushes on main).
concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      # `write` is required only to publish the coverage badge to the `badges`
      # branch on pushes to main. The badge step is skipped on pull requests.
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        # Runs the full suite and enforces the coverage thresholds in
        # vitest.config.ts (the ratcheting floor).
        run: npm run coverage

      - name: Publish badges
        # Self-contained auto-updating badges (coverage + i18n): only on pushes to main.
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/publish-badges.sh
