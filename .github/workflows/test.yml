name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      # `write` is required only to publish the coverage badge to the `badges`
      # branch on pushes to main. The badge step is skipped on pull requests.
      contents: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        # Runs the full suite and enforces the coverage thresholds in
        # vitest.config.ts (the ratcheting floor).
        run: npm run coverage

      - name: Publish coverage badge
        # Self-contained auto-updating badge: only on pushes to main.
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/publish-coverage-badge.sh
