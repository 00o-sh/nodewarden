name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

# Minimal default token: read-only at the top level. The test job escalates
# to contents: write only where it needs to (badge publishing on main).
permissions:
  contents: read

# Cancel superseded runs on the same ref so a rapid push sequence does not
# pile up redundant jobs (and racing badge pushes on main).
concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      # `write` is required only to publish the coverage badge to the `badges`
      # branch on pushes to main. The badge step is skipped on pull requests.
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Need both PR endpoints present locally to diff changed files.
          fetch-depth: 0

      - name: Detect backend-relevant changes
        id: changes
        # The `test` check is required by branch protection, so the job must
        # always run and report. We only skip the expensive install + coverage
        # steps when a PR touches nothing that can affect the backend suite
        # (e.g. docs- or webapp-only changes). Non-PR events (push to main,
        # manual dispatch) always run the full suite so the badge stays honest.
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changed=$(git diff --name-only \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.event.pull_request.head.sha }}")
          echo "Changed files:"
          echo "$changed"
          if printf '%s\n' "$changed" | grep -qE '^(src/|shared/|test/|vitest\.|wrangler|package\.json|package-lock\.json|\.nvmrc|tsconfig|\.github/workflows/test\.yml)'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Backend-relevant changes detected; running the full suite."
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "No backend-relevant changes; skipping the coverage run."
          fi

      - name: Setup Node.js
        if: steps.changes.outputs.run == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        if: steps.changes.outputs.run == 'true'
        run: npm ci

      - name: Type check (API)
        if: steps.changes.outputs.run == 'true'
        # Vitest transpiles via esbuild (types are stripped, not checked), so the
        # strict backend type check runs separately. Fails fast before the suite.
        run: npm run typecheck

      - name: Lint (API)
        if: steps.changes.outputs.run == 'true'
        # oxlint over the backend sources. --deny-warnings (in the script) makes any
        # finding fail CI, so the lint stays clean as new code lands. Named lint:api
        # to stay distinct from the frontend `lint` (eslint over webapp/).
        run: npm run lint:api

      - name: Run tests with coverage
        if: steps.changes.outputs.run == 'true'
        # Runs the full suite and enforces the coverage thresholds in
        # vitest.config.ts (the ratcheting floor).
        run: npm run coverage

      - name: Frontend coverage (for badge)
        # Produces coverage/webapp/coverage-summary.json so publish-badges.sh can
        # emit the separate "Web coverage" badge. The frontend job is what gates
        # the webapp ratchet on PRs; here we only need the number, on main.
        if: steps.changes.outputs.run == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npm run coverage:webapp

      - name: Publish badges
        # Self-contained auto-updating badges (API + web coverage + i18n): only on pushes to main.
        if: steps.changes.outputs.run == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/publish-badges.sh

  frontend:
    # Frontend (webapp/) testing pyramid. Kept as its own job so a frontend
    # failure is attributable on its own and runs in parallel with the backend
    # `test` job. Every blocking step below must be green for a PR to be
    # considered mergeable. See docs/frontend-testing.md.
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (frontend)
        # Blocking: ESLint over webapp/ (see eslint.config.js).
        run: npm run lint

      - name: Typecheck (frontend)
        # Blocking: tsc --noEmit over webapp/. The pre-existing errors this gate
        # originally surfaced (a real onSaveSettings arity bug plus two TS
        # strictness issues) are now fixed, so a type regression fails CI.
        run: npm run typecheck:webapp

      - name: Unit + component tests with coverage (frontend)
        # Blocking: enforces the ratcheting coverage floor in
        # vitest.webapp.config.ts.
        run: npm run coverage:webapp

      - name: Contract tests (frontend api client vs real worker)
        # Blocking: runs the webapp api client against the real Workers runtime
        # (Miniflare), catching request/response shape drift between the
        # frontend and backend.
        run: npm run test:contract

      - name: Build (production + demo)
        # Blocking: a green build is the only thing that exercises the generated
        # service worker and the full Vite/Rollup pipeline.
        run: |
          npm run build
          npm run build:demo

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2E smoke tests (demo build)
        # Blocking: drives critical user journeys in a real browser against the
        # demo build (network-free, deterministic).
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          if-no-files-found: ignore
          path: playwright-report/
          retention-days: 7
