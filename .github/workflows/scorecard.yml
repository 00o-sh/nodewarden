name: OpenSSF Scorecard

# Continuously grades the repository's security posture (branch protection,
# token permissions, pinned dependencies, dangerous workflow patterns, etc.)
# and publishes the results to the GitHub Security tab as SARIF.

on:
  branch_protection_rule:
  schedule:
    - cron: "23 5 * * 1"
  push:
    branches:
      - main
  workflow_dispatch:

# Scorecard's default token needs almost nothing; everything else is granted
# per-step.
permissions: read-all

concurrency:
  group: scorecard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analysis:
    runs-on: ubuntu-latest
    permissions:
      # Needed to upload SARIF to the code-scanning dashboard.
      security-events: write
      # Needed for GitHub OIDC so Scorecard can publish its signed result.
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scorecard-results
          path: scorecard-results.sarif
          retention-days: 5

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: scorecard-results.sarif
          category: scorecard
