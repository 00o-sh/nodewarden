# Gitleaks configuration for NodeWarden.
# Extends the default ruleset and allowlists known false positives.

[extend]
useDefault = true

[allowlist]
description = "Placeholder/fixture values that are not real secrets: the public demo build (npm run build:demo) and the test suite (Vitest configs + test fixtures). Matched by path, so historical commits are covered too."
paths = [
  '''webapp/src/lib/demo\.ts''',
  '''webapp/src/lib/demo\.empty\.ts''',
  '''vitest\..*config\.ts''',
  '''test/.*''',
]
